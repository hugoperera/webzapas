    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - UrbanKicks</title>
    <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header class="header_general"> 
    
    <div class="menu_header">
        
        <div>
            <a href="index.html" class="logo">
                <img src="img/logo.svg" width="40px" alt="Logo de UrbanKicks">
            </a>
        </div>

        <nav class="botones_header">
            <a href="catalogo.html">Catalogo</a>
            <a href="Sobrenosotros.html">Sobre nosotros</a>
            <a href="contacto.html">Contacto</a>
        </nav>

        <div class="redes_sociales">
            <a href="#"><img src="img/instagram.svg" width="40px" alt="instagram"></a>
            <a href="#"><img src="img/whatsapp.svg" width="40px" alt="whatsapp"></a>
        </div>
        
    </div>
</header>

    <main class="contenedor_formulario">
        <section class="info_contacto">
            <h2>¿Tienes alguna duda?</h2>
            <p>Escríbenos y nuestro equipo de expertos en sneakers te responderá en menos de 24 horas.</p>
        </section>

        <form action="#" method="POST" class="formulario_pro">
            
            <div class="campo">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Hugo García" required>
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>

            <div class="campo">
                <label for="motivo">Motivo de consulta</label>
                <select id="motivo" name="motivo">
                    <option value="pedido">Estado de mi pedido</option>
                    <option value="talla">Duda con las tallas</option>
                    <option value="devolucion">Devoluciones</option>
                    <option value="otros">Otros motivos</option>
                </select>
            </div>

            <div class="campo_radio">
                <p>¿Cómo prefieres que te contactemos?</p>
                <label>
                    <input type="radio" name="preferencia" value="email" checked> Email
                </label>
                <label>
                    <input type="radio" name="preferencia" value="whatsapp"> WhatsApp
                </label>
            </div>

            <div class="campo">
                <label for="mensaje">Tu mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Cuéntanos qué necesitas..."></textarea>
            </div>

            <div class="campo_check">
                <input type="checkbox" id="privacidad" name="privacidad" required>
                <label for="privacidad">Acepto la política de privacidad y el uso de mis datos.</label>
            </div>

            <button type="submit" class="boton_enviar">Enviar Mensaje</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2024 UrbanKicks - Diseñado por Hugo García</p>
        <div class="footer_redes">
            <a href="#">Instagram</a>
            <a href="#">TikTok</a>
        </div>
    </footer>

</body>
</html>
</body>
</html>
